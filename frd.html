<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(45deg,#ff6a00,#ff2d95,#7a00ff);
    background-size:400% 400%;
    animation:bg 10s infinite alternate;
    color:white;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
    margin-top:50px;
}

h1{
    font-size:50px;
    text-shadow:2px 2px 10px black;
}

.photo{
    margin-top:30px;
}

.photo img{
    width:350px;
    border-radius:20px;
    border:5px solid white;
    box-shadow:0px 0px 20px black;
}

.message{
    margin-top:25px;
    font-size:24px;
    background:rgba(0,0,0,0.4);
    padding:15px;
    display:inline-block;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday My Friend 🎂</h1>

<div class="photo">
<img src="C:\Users\ADMIN\Desktop\nothing\friend.jpg.jpeg" alt="Friend Photo">
</div>

<div class="message">
Wishing you a day filled with happiness, fun and success.<br>
May all your dreams come true! 🎁🎊
</div>

</div>

</body>
</html>
